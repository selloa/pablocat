    <script type="application/ld+json">
        {
          "@context": "https://schema.org",

          "name": "PabloCat - Random Cat Generator",

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            min-height: 100vh;
            min-height: 100dvh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1a1a1a;
        }
        body {
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            position: relative;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        }
        .cat-wrapper {
            position: relative;
            width: min(85vmin, 400px);
            height: min(85vmin, 400px);
            cursor: pointer;
            border: 0;
            padding: 0;
            background: transparent;
            appearance: none;
        }
        .cat-wrapper:focus-visible {
            outline: 2px solid rgba(175, 255, 175, 0.9);
            outline-offset: 6px;
        }
        .cat-placeholder {
            position: absolute;
            inset: 0;
            border-radius: 16px;
            border: 4px solid #5a6b5a;
            background: #2a2a2a;
            opacity: 0;
            transition: opacity 0.2s ease;
            pointer-events: none;
        }
        .cat-wrapper.loading .cat-placeholder {
            opacity: 1;
        }
        @media (prefers-reduced-motion: no-preference) {
            .cat-wrapper.loading .cat-placeholder {
                animation: pulse 0.8s ease-in-out infinite;
            }
        }
        @keyframes pulse {
            50% { opacity: 0.5; }
        }
        .cat {
            position: relative;
            width: 100%;
            height: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 16px;
            object-fit: cover;
            border: 4px solid #5a6b5a;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.3s ease, box-shadow 0.3s ease, opacity 0.5s ease;
            opacity: 0;
        }
        .cat.loaded {
            opacity: 1;
        }
        @media (prefers-reduced-motion: reduce) {
            .cat.loaded {
                transition: none;
            }
        }
        @media (prefers-reduced-motion: no-preference) {
            .cat:hover {
                transform: scale(1.05) rotate(2deg);
                box-shadow: 0 8px 24px rgba(90, 107, 90, 0.3);
            }
        }
        .seo-copy {
            position: absolute;
            left: 50%;
            bottom: calc(env(safe-area-inset-bottom) + 14px);
            transform: translateX(-50%);
            width: min(92vw, 560px);
            text-align: center;
            padding: 10px 14px;
            background: rgba(26, 26, 26, 0.65);
            border: 1px solid rgba(175, 255, 175, 0.14);
            border-radius: 14px;
            color: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(6px);
            opacity: 1;
            transition: opacity 0.9s ease, transform 0.9s ease;
        }
        .seo-copy.fading {
            opacity: 0;
            transform: translateX(-50%) translateY(8px);
            pointer-events: none;
        }
        @media (prefers-reduced-motion: reduce) {
            .seo-copy {
                transition: none;
            }
        }
        .seo-copy h1 {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.2px;
        }
        .seo-copy p {
            margin-top: 4px;
            font-size: 13px;
            line-height: 1.35;
            opacity: 0.95;
        }
    </style>
</head>
<body>
    <div class="cat-wrapper loading" id="cat-wrapper" role="button" tabindex="0" title="Click for new cat" aria-label="Generate a random cat">
        <div class="cat-placeholder" aria-hidden="true"></div>
        <img id="cat" class="cat" alt="Random cat image" />
    </div>

    <div class="seo-copy" role="note" aria-label="About PabloCat">
        <h1>PabloCat</h1>
        <p>Infinite cat generator: click for a new random cat image.</p>
    </div>

    <script>
        const catWrapper = document.getElementById('cat-wrapper');
        const catImg = document.getElementById('cat');
        const seoCopy = document.querySelector('.seo-copy');
        let initSeoFadeTimeoutId = null;
        let seoCopyHasFaded = false;

        function fadeOutSeoCopy(_reason) {
            if (seoCopyHasFaded) return;
            seoCopyHasFaded = true;
            if (!seoCopy) return;

            if (initSeoFadeTimeoutId) {
                clearTimeout(initSeoFadeTimeoutId);
                initSeoFadeTimeoutId = null;
            }

            const prefersReducedMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
            if (prefersReducedMotion) {
                seoCopy.style.display = 'none';
                return;
            }

            seoCopy.classList.add('fading');
            // Hide after the CSS transition completes so it doesn't take layout space.
            setTimeout(() => {
                seoCopy.style.display = 'none';
            }, 900);
        }

        // GoatCounter snippet is `async`, so it may not be ready at first user interaction.
        // Queue events briefly to avoid dropping early taps/page loads.
        const goatEventQueue = [];
        let goatQueueFlushTimer = null;

        function flushGoatEventQueue() {
            if (!window.goatcounter || typeof window.goatcounter.count !== 'function') return;
            while (goatEventQueue.length > 0) {
                const payload = goatEventQueue.shift();
                window.goatcounter.count(payload);
            }
            if (goatQueueFlushTimer) {
                clearInterval(goatQueueFlushTimer);
                goatQueueFlushTimer = null;
            }
        }

        function trackGoatEvent(path, title) {
            try {
                const payload = { path: path, title: title ?? path, event: true };
                if (window.goatcounter && typeof window.goatcounter.count === 'function') {
                    window.goatcounter.count(payload);
                    return;
                }

                goatEventQueue.push(payload);

                // Start a short-lived flusher so events get sent as soon as GoatCounter is ready.
                if (!goatQueueFlushTimer) {
                    goatQueueFlushTimer = setInterval(flushGoatEventQueue, 200);
                    setTimeout(() => {
                        if (goatQueueFlushTimer) {
                            clearInterval(goatQueueFlushTimer);
                            goatQueueFlushTimer = null;
                        }
                    }, 3000);
                }
            } catch (e) {
                console.warn('GoatCounter event failed:', e);
            }
        }

        // Attribute success/failure to the initiating user action (tap vs auto).
        let pendingLoad = null; // { token: number, source: 'tap' | 'auto' | 'init' }
        let loadSeq = 0;

        async function fetchRandomCat() {
            try {
                const res = await fetch('https://api.thecatapi.com/v1/images/search?limit=1&size=small');
                if (!res.ok) throw new Error(res.status);
                const data = await res.json();
                const url = data[0]?.url ?? null;
                return { url, reason: url ? 'ok' : 'empty' };
            } catch (e) {
                console.error('Error fetching cat:', e);
                return { url: null, reason: 'failed' };
            }
        }

        function onCatImageLoad() {
            catImg.classList.add('loaded');
            catWrapper.classList.remove('loading');

            const loadedToken = catImg.dataset.loadToken;

            const matchedPendingLoad = (pendingLoad && String(pendingLoad.token) === loadedToken) ? pendingLoad : null;

            if (matchedPendingLoad && matchedPendingLoad.source === 'tap') {
                trackGoatEvent('cat-image-loaded', 'Cat image loaded');
                trackGoatEvent('cat-tap-success', 'Tap -> loaded');
            }

            if (matchedPendingLoad) {
                pendingLoad = null;
            }
        }

        async function loadNewCat(source = 'init') {
            catWrapper.classList.add('loading');
            catImg.classList.remove('loaded');

            const token = ++loadSeq;
            pendingLoad = { token, source };
            catImg.dataset.loadToken = String(token);

            const result = await fetchRandomCat();
            if (result.url) {
                catImg.src = result.url;
                // loaded state is applied in onCatImageLoad when image finishes loading
                return;
            }

            // Failure paths: count only if this load was initiated by a user tap.
            if (source === 'tap') {
                if (result.reason === 'failed') {
                    trackGoatEvent('cat-load-failed', 'Cat load failed');
                    trackGoatEvent('cat-tap-failed', 'Tap -> failed');
                } else if (result.reason === 'empty') {
                    trackGoatEvent('cat-load-empty', 'Cat response empty');
                    trackGoatEvent('cat-tap-failed', 'Tap -> empty');
                } else {
                    trackGoatEvent('cat-load-failed', 'Cat load failed');
                    trackGoatEvent('cat-tap-failed', 'Tap -> failed');
                }
            }

            catWrapper.classList.remove('loading');
            pendingLoad = null;
        }

        catImg.addEventListener('load', onCatImageLoad);

        const AUTO_INTERVAL_MS = 20000;
        const PAUSE_AFTER_TAP_MS = 45000;
        let autoIntervalId = null;
        let resumeTimeoutId = null;

        function startAutoRefresh() {
            stopAutoRefresh();
            autoIntervalId = setInterval(() => loadNewCat('auto'), AUTO_INTERVAL_MS);
        }

        function stopAutoRefresh() {
            if (autoIntervalId) {
                clearInterval(autoIntervalId);
                autoIntervalId = null;
            }
            if (resumeTimeoutId) {
                clearTimeout(resumeTimeoutId);
                resumeTimeoutId = null;
            }
        }

        function scheduleResumeAutoRefresh() {
            stopAutoRefresh();
            resumeTimeoutId = setTimeout(() => {
                resumeTimeoutId = null;
                startAutoRefresh();
            }, PAUSE_AFTER_TAP_MS);
        }

        function handleCatActivate() {
            trackGoatEvent('cat-tap', 'Cat tapped');

            // Unique "engaged" users: count first tap per device/browser.
            // This helps answer "how many people tap" with a single metric.
            try {
                const firstTapKey = 'pablocat:first-tap-sent';
                if (!localStorage.getItem(firstTapKey)) {
                    localStorage.setItem(firstTapKey, '1');
                    trackGoatEvent('cat-first-tap', 'First cat tap');
                }
            } catch (e) {
                // localStorage might be blocked; don't break the UX.
            }

            loadNewCat('tap');
            scheduleResumeAutoRefresh();
        }

        catWrapper.addEventListener('click', () => {
            handleCatActivate();
        });

        catWrapper.addEventListener('keydown', (e) => {
            // Keep keyboard accessibility now that the wrapper is no longer a native <button>.
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                handleCatActivate();
            }
        });

        // Initial load, then start auto-refresh (new cat every 20s)
        loadNewCat('init');
        // Show message briefly on load, then fade it out.
        initSeoFadeTimeoutId = setTimeout(() => fadeOutSeoCopy('timeout'), 6500);
        startAutoRefresh();

        // Register a service worker so browsers can install as a PWA.
        // Note: works on HTTPS (or localhost).
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch((e) => {
                    console.error('Service worker registration failed:', e);
                });
            });
        }
    </script>
